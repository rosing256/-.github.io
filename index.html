<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你的"附近"人格查询器 | NCT测试</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f7f7fc;--card:#ffffff;--card2:#f0f0f8;--accent:#6c5ce7;--accent2:#5a4bd1;--green:#00b894;--pink:#e84393;--orange:#e17055;--text:#2d3436;--dim:#636e72;--glow:rgba(108,92,231,.18);--shadow:0 2px 12px rgba(0,0,0,.06);--shadow-lg:0 8px 30px rgba(0,0,0,.1)}
body{font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* BG */
.bg{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg .o{position:absolute;border-radius:50%;filter:blur(100px);opacity:.15;animation:drift 22s infinite ease-in-out}
.bg .o:nth-child(1){width:420px;height:420px;background:#a29bfe;top:-120px;left:-80px}
.bg .o:nth-child(2){width:360px;height:360px;background:#55efc4;bottom:-100px;right:-60px;animation-delay:-8s}
.bg .o:nth-child(3){width:280px;height:280px;background:#fd79a8;top:40%;left:60%;animation-delay:-15s}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(40px,-30px) scale(1.08)}66%{transform:translate(-30px,30px) scale(.94)}}

.wrap{position:relative;z-index:1;max-width:600px;margin:0 auto;padding:20px;min-height:100vh;display:flex;flex-direction:column}

/* Progress */
.top-bar{margin-bottom:24px}
.top-row{display:flex;justify-content:space-between;font-size:12px;color:var(--dim);margin-bottom:6px;font-weight:500}
.prog{width:100%;height:4px;background:rgba(0,0,0,.06);border-radius:2px;overflow:hidden}
.prog .bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:2px;transition:width .5s ease}

/* Stage tag */
.stag{display:inline-block;font-size:11px;padding:4px 14px;border-radius:20px;font-weight:600;margin-bottom:12px}
.stag.s1{background:rgba(108,92,231,.08);color:var(--accent)}
.stag.s2{background:rgba(0,184,148,.08);color:var(--green)}
.stag.s3{background:rgba(232,67,147,.08);color:var(--pink)}
.stag.s4{background:rgba(225,112,85,.08);color:var(--orange)}

/* Question area */
.q-area{flex:1;display:flex;flex-direction:column;justify-content:center;animation:fadeUp .4s ease}
.q-text{font-size:18px;font-weight:700;line-height:1.8;margin-bottom:8px;color:#1a1a2e}
.q-num{color:var(--accent);margin-right:4px}
.q-hint{font-size:13px;color:var(--dim);margin-bottom:14px;line-height:1.6}

/* Options */
.opts{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.obtn{background:var(--card);border:2px solid rgba(0,0,0,.06);border-radius:14px;padding:14px 16px;font-size:15px;line-height:1.6;color:var(--text);cursor:pointer;transition:all .2s;text-align:left;font-family:inherit;display:flex;align-items:flex-start;gap:10px;box-shadow:var(--shadow)}
.obtn:hover{border-color:rgba(108,92,231,.25);background:#fafafe;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.obtn.sel{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow);background:rgba(108,92,231,.04)}
.obtn .lt{flex-shrink:0;width:26px;height:26px;line-height:26px;text-align:center;border-radius:50%;font-size:12px;font-weight:700;background:rgba(108,92,231,.1);color:var(--accent);transition:all .2s}
.obtn.sel .lt{background:var(--accent);color:#fff}
.obtn.ck .lt{border-radius:6px;font-size:13px;border:2px solid rgba(0,0,0,.12);background:transparent;color:transparent;width:24px;height:24px;line-height:18px}
.obtn.ck.on .lt{border-color:var(--green);background:var(--green);color:#fff}
.obtn.ck.on{border-color:var(--green);box-shadow:0 0 0 3px rgba(0,184,148,.15)}

/* Rating */
.rrow{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.rrow .rl{flex:1;font-size:14px;line-height:1.6;color:#2d3436}
.rrow .rv{display:flex;gap:6px;flex-shrink:0}
.rbtn{width:36px;height:36px;border-radius:10px;border:2px solid rgba(0,0,0,.08);background:var(--card);color:var(--dim);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit}
.rbtn:hover{border-color:rgba(108,92,231,.3)}
.rbtn.on{border-color:var(--accent);background:rgba(108,92,231,.08);color:var(--accent);font-weight:800}

/* Text input */
.tinput{width:100%;background:var(--card);border:2px solid rgba(0,0,0,.08);border-radius:14px;padding:14px 16px;font-size:15px;color:var(--text);font-family:inherit;resize:vertical;min-height:90px;outline:none;transition:border-color .2s;box-shadow:var(--shadow)}
.tinput:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
.tinput::placeholder{color:#b2bec3}

/* Nav */
.nav{display:flex;justify-content:space-between;align-items:center;padding:20px 0}
.nbtn{padding:11px 26px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;border:none}
.nbtn.prev{background:var(--card);border:1px solid rgba(0,0,0,.1);color:var(--dim);box-shadow:var(--shadow)}
.nbtn.prev:hover{border-color:rgba(0,0,0,.2);color:var(--text)}
.nbtn.next{background:linear-gradient(135deg,var(--accent),#8b5cf6);color:#fff;box-shadow:0 2px 12px var(--glow)}
.nbtn.next:hover{box-shadow:0 6px 24px var(--glow);transform:translateY(-1px)}
.nbtn.next:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}
.nbtn.submit{background:linear-gradient(135deg,var(--accent),var(--green));color:#fff;padding:13px 34px;font-size:15px;box-shadow:0 2px 16px var(--glow)}

/* Intro */
.intro{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center}
.intro .logo{font-size:64px;margin-bottom:12px}
.intro h1{font-size:30px;font-weight:900;background:linear-gradient(135deg,var(--accent),#00b894);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.intro .sub{font-size:13px;color:var(--dim);letter-spacing:4px;text-transform:uppercase;margin-bottom:24px;font-weight:500}
.intro .desc{font-size:14px;color:#636e72;line-height:2;max-width:460px;margin-bottom:30px}
.dims{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:420px;margin-bottom:30px}
.dcard{background:var(--card);border-radius:12px;padding:14px;text-align:left;border:1px solid rgba(0,0,0,.05);box-shadow:var(--shadow)}
.dcard .dl{font-size:11px;color:var(--dim);margin-bottom:4px}
.dcard .dv{font-size:13px;font-weight:700}
.dcard .dv .vs{color:#b2bec3;font-weight:400;margin:0 4px}
.start-btn{background:linear-gradient(135deg,var(--accent),#8b5cf6);color:#fff;border:none;padding:15px 44px;border-radius:50px;font-size:17px;font-weight:800;cursor:pointer;transition:all .3s;box-shadow:0 4px 24px var(--glow);font-family:inherit}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px var(--glow)}

/* Result */
.result{display:none;flex-direction:column;align-items:center;min-height:100vh;padding-top:30px;text-align:center;animation:fadeUp .6s ease}
.result.show{display:flex}
.result .illust{margin-bottom:20px}
.result .rcode{font-size:52px;font-weight:900;letter-spacing:6px;background:linear-gradient(135deg,var(--accent),#00b894);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;animation:fadeUp .8s ease}
.result .rname{font-size:22px;font-weight:800;color:#1a1a2e;margin-bottom:14px;animation:fadeUp .8s ease .1s both}
.result .rmotto{font-size:15px;color:var(--accent);font-style:italic;margin-bottom:22px;font-weight:500;animation:fadeUp .8s ease .15s both}
.result .rdesc{font-size:14px;line-height:2.1;color:#636e72;max-width:440px;margin-bottom:28px;animation:fadeUp .8s ease .2s both}
.result .rdims{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:420px;margin-bottom:30px;animation:fadeUp .8s ease .25s both}
.rdim{background:var(--card);border-radius:12px;padding:14px;text-align:center;border:1px solid rgba(0,0,0,.05);box-shadow:var(--shadow)}
.rdim .rl{font-size:11px;color:var(--dim);margin-bottom:3px}
.rdim .rv{font-size:16px;font-weight:800}
.rdim .rs{font-size:11px;color:#b2bec3;margin-top:3px}
.rbtn2{background:var(--card);border:2px solid rgba(0,0,0,.08);color:var(--dim);padding:11px 30px;border-radius:50px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;margin-bottom:40px;box-shadow:var(--shadow);animation:fadeUp .8s ease .3s both}
.rbtn2:hover{border-color:var(--accent);color:var(--accent)}

/* Admin */
.admin-btn{position:fixed;top:12px;right:12px;z-index:10;background:var(--card);border:1px solid rgba(0,0,0,.08);border-radius:8px;padding:7px 14px;font-size:11px;color:var(--dim);cursor:pointer;font-family:inherit;transition:all .2s;box-shadow:var(--shadow)}
.admin-btn:hover{border-color:var(--accent);color:var(--accent)}
.admin{min-height:100vh;padding-top:10px}
.admin h2{font-size:20px;font-weight:800;color:#1a1a2e;margin-bottom:4px}
.admin .sub{font-size:13px;color:var(--dim);margin-bottom:20px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.stat-card{background:var(--card);border-radius:12px;padding:16px;border:1px solid rgba(0,0,0,.05);box-shadow:var(--shadow)}
.stat-card .sl{font-size:11px;color:var(--dim);margin-bottom:3px}
.stat-card .sv{font-size:24px;font-weight:800}
.chart-row{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.chart-box{background:var(--card);border-radius:14px;padding:18px;flex:1;min-width:260px;border:1px solid rgba(0,0,0,.05);box-shadow:var(--shadow)}
.chart-box h3{font-size:13px;font-weight:700;margin-bottom:10px;color:#1a1a2e}
.chart-box svg{width:100%}
.tbl-wrap{overflow-x:auto;margin-bottom:20px}
.tbl-wrap table{width:100%;border-collapse:collapse;font-size:12px}
.tbl-wrap th{background:var(--card2);padding:8px 6px;text-align:left;font-weight:700;white-space:nowrap;border-bottom:2px solid rgba(0,0,0,.08);color:#2d3436}
.tbl-wrap td{padding:7px;border-bottom:1px solid rgba(0,0,0,.04);white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis;color:#2d3436}
.exp-row{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.exp-btn{background:var(--card);border:1px solid rgba(0,0,0,.08);border-radius:10px;padding:10px 18px;font-size:13px;color:var(--text);cursor:pointer;font-family:inherit;transition:all .2s;box-shadow:var(--shadow);font-weight:500}
.exp-btn:hover{border-color:var(--accent);color:var(--accent)}
.q-stat{background:var(--card);border-radius:14px;padding:18px;margin-bottom:14px;border:1px solid rgba(0,0,0,.05);box-shadow:var(--shadow);animation:fadeUp .3s ease}
.q-stat .qs-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.q-stat .qs-num{font-size:11px;color:var(--accent);font-weight:700}
.q-stat .qs-type{font-size:10px;color:var(--dim);background:rgba(0,0,0,.04);padding:3px 10px;border-radius:10px;font-weight:500}
.q-stat .qs-text{font-size:14px;font-weight:700;line-height:1.6;margin-bottom:12px;color:#1a1a2e}
.q-stat .qs-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.q-stat .qs-lbl{flex-shrink:0;width:24px;height:24px;line-height:24px;text-align:center;border-radius:50%;font-size:11px;font-weight:700;background:rgba(108,92,231,.08);color:var(--accent)}
.q-stat .qs-bar-wrap{flex:1;height:22px;background:rgba(0,0,0,.03);border-radius:6px;overflow:hidden;position:relative}
.q-stat .qs-bar{height:100%;border-radius:6px;transition:width .5s ease;min-width:2px}
.q-stat .qs-bar-text{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:11px;color:#2d3436;white-space:nowrap;font-weight:600}
.q-stat .qs-opt{font-size:12px;line-height:1.5;color:var(--dim);margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
.q-stat .qs-avg{font-size:12px;color:var(--accent);font-weight:700}
.section-title{font-size:16px;font-weight:800;margin:28px 0 14px;padding-bottom:8px;border-bottom:2px solid rgba(0,0,0,.06);color:#1a1a2e}

/* Filter end */
.fend{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center}
.fend.show{display:flex}
.fend .flogo{font-size:48px;margin-bottom:16px}
.fend .fmsg{font-size:16px;color:var(--dim);margin-bottom:10px;line-height:1.8}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:480px){.intro h1{font-size:24px}.result .rcode{font-size:38px}.rrow{flex-direction:column;align-items:flex-start}.rrow .rv{align-self:flex-start}}
</style>
</head>
<body>
<div class="bg"><div class="o"></div><div class="o"></div><div class="o"></div></div>
<div class="wrap" id="app"></div>
<script>
const $=s=>document.querySelector(s);
const app=document.getElementById('app');

// ===== TYPES & ILLUSTRATIONS =====
const TYPES={
'ESCO':{name:'附近的守望者',motto:'附近没我不行。',desc:'你是钢筋水泥森林里的稀有物种。你知道楼下便利店老板的猫叫什么名字，知道哪个公园的长椅晒太阳最舒服。你是社区的活地图，是人情味的最后防线。如果社区有群，你一定是那个热心肠的群主。'},
'ESCH':{name:'守望者的居家版',motto:'远亲不如近邻，远门不如不出。',desc:'你很在意附近的烟火气，也愿意和邻居互动，但你的活动范围基本就是楼下那几条街。你是那种"楼下大爷大妈都认识你但你从不去远处冒险"的人。社区的定海神针，虽然很少出远门。'},
'ESHO':{name:'社区外交官',motto:'人脉就是我的地图。',desc:'你出门不光是为了逛，更是为了"联结"。你既享受线下空间的温度，又善于把不同的人连在一起。你是那种在公园里能同时和三拨人聊天的人。'},
'ESHD':{name:'热闹的实用主义者',motto:'关系好，办事少。',desc:'你积极出门，积极社交，但对"附近消失"这件事并不伤感——你只是觉得有人的地方更好办事。你是那种"邻居关系好是因为方便，不是因为感情深"的现实主义者。'},
'ENCO':{name:'跨界联结者',motto:'线上线下，我全都要。',desc:'你的社交不限于物理附近，线上社群你也是活跃分子。你既在意附近的人情味，又在网络世界中如鱼得水。你是现实与虚拟之间的桥梁。'},
'ENCH':{name:'数字游民的锚',motto:'群里社牛，出门社恐。',desc:'你虽然以家为大本营，但你的社交触角延伸到了整个互联网。你关心附近的变化，只是你的方式是在社区群里讨论而不是亲自出门。线上意见领袖，线下隐形人。'},
'ENHO':{name:'云端流浪者',motto:'人在附近，魂在云端。',desc:'你的身体在逛街，灵魂在线上。你享受出门的感觉，但你的"附近"更多存在于手机屏幕里。你可能一边在咖啡馆坐着，一边在三个群里聊天。'},
'ENHD':{name:'赛博游牧人',motto:'我的附近在5G信号里。',desc:'你的身体住在小区，但灵魂住在互联网。你的"附近"是微信群、是游戏服务器、是兴趣社群。现实中的邻居只是NPC，而你的精神部落远在千里之外。'},
'ISCO':{name:'附近的观察者',motto:'我来了，我看了，我没说话。',desc:'你很了解周边的环境，也经常出门，但你和人的互动是克制的。你爱逛附近的店和公园，但不会和老板闲聊。你是"沉默的常客"。'},
'ISCH':{name:'安静的锚点',motto:'沉默的守护，低调的熟悉。',desc:'你熟悉家附近的一切，但你的社交半径止步于"认识"。你是那种楼下便利店去了三年，老板还不知道你叫什么的人。你对附近有归属感，只是用沉默表达。'},
'ISHO':{name:'氛围感路人',motto:'我消费的是氛围，不是社交。',desc:'你对"人"不感兴趣，但对"空间"很挑剔。你爱去家附近的咖啡馆发呆，爱去公园散步，但你戴着降噪耳机，拒绝一切不必要的社交。你爱的不是附近，而是附近提供的背景板。'},
'ISHD':{name:'隐形居民',motto:'我在这里，但我从不在场。',desc:'你住在附近，但你在附近的雷达上完全隐形。你不出门社交，不关心社区变化，不在线上参与讨论。你是"附近"这个概念里最安静的存在。'},
'INCO':{name:'数字守望者',motto:'键盘上的社区英雄。',desc:'你在乎附近的变化和消失，但你的关心方式是线上的。你可能在社区群里提意见、写帖子讨论附近的问题，但你很少亲自出门去和邻居面对面。'},
'INCH':{name:'数字隐士',motto:'心系附近，身不行动。',desc:'你既不常出门，也不在线上社交——但你对"附近的消失"有一种隐秘的在意。你可能在深夜刷到社区新闻时会叹口气，但第二天继续你的封闭生活。'},
'INHO':{name:'云端漫游者',motto:'换个地方宅而已。',desc:'你偶尔出门，但你的"附近"在屏幕那头。你可能去咖啡馆，但只是为了换个地方上网。你是那种"人在咖啡馆，心在服务器"的人。'},
'INHD':{name:'隐形独行侠',motto:'附近？什么附近？',desc:'你的世界只有家和公司两点一线。邻居对你来说只是门牌号，快递是你和外界唯一的物质交换。你享受这种极致的边界感，毕竟，"只要我不认识邻居，邻居就伤害不了我"。'},
};

function svgIllust(code){
  const P='#6c5ce7',G='#00b894',K='#e84393',O='#e17055',B='#74b9ff',Y='#ffeaa7',W='#dfe6e9',D='#2d3436',L='#f0f0f8';

// ===== QUESTION PAGE =====
function goQ(i){
  qi=i;
  if(i>=QS.length){calcResult();return;}
  const q=QS[i];
  const total=QS.length;
  const pct=(i/total*100).toFixed(0);

  let body='';
  if(q.type==='single'){
    body=`<div class="opts">${q.opts.map(o=>`<button class="obtn${ans['q'+i]===o.l?' sel':''}" onclick="pickS(${i},'${o.l}',this)"><span class="lt">${o.l}</span><span>${o.t}</span></button>`).join('')}</div>`;
  } else if(q.type==='multi'){
    const sel=ans['q'+i]||[];
    body=`<div class="opts">${q.opts.map(o=>`<button class="obtn ck${sel.includes(o.l)?' on':''}" onclick="pickM(${i},'${o.l}',this)"><span class="lt">✓</span><span>${o.t}</span></button>`).join('')}</div>`;
  } else if(q.type==='rating'){
    body=`<div>${q.hint?`<div class="q-hint">${q.hint}</div>`:''}${q.ratings.map((r,ri)=>`<div class="rrow"><span class="rl">${ri+1}. ${r}</span><div class="rv">${[1,2,3,4,5].map(v=>`<button class="rbtn${r24[ri+1]===v?' on':''}" onclick="pickR(${ri+1},${v},this)">${v}</button>`).join('')}</div></div>`).join('')}</div>`;
  } else if(q.type==='open'){
    body=`<textarea class="tinput" id="openInput" placeholder="${q.placeholder||''}" oninput="ans['q'+${i}]=this.value">${ans['q'+i]||''}</textarea>`;
  }

  const canNext=q.type==='open'||q.type==='multi'||q.type==='rating'||ans['q'+i];

  app.innerHTML=`
  <div class="top-bar">
    <div class="top-row"><span>第${q.stage}阶段 · ${q.stageName}</span><span>${i+1} / ${total}</span></div>
    <div class="prog"><div class="bar" style="width:${pct}%"></div></div>
  </div>
  <div class="q-area">
    <span class="stag ${q.stagClass}">第${q.stage}阶段</span>
    <div class="q-text"><span class="q-num">${i+1}.</span>${q.q}</div>
    ${body}
  </div>
  <div class="nav">
    <button class="nbtn prev" onclick="goQ(${i-1})" ${i===0?'style="visibility:hidden"':''}>← 上一题</button>
    ${i===total-1?`<button class="nbtn submit" onclick="calcResult()">查看结果 →</button>`:`<button class="nbtn next" onclick="tryNext(${i})" ${!canNext?'disabled':''}>下一题 →</button>`}
  </div>`;
}

function pickS(i,v,btn){
  ans['q'+i]=v;
  btn.parentElement.querySelectorAll('.obtn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  const q=QS[i];
  if(q.filter){
    const f=q.filter(v);
    if(f==='end'){showFilterEnd();return;}
    if(f==='result'){setTimeout(()=>calcResult(),350);return;}
  }
  setTimeout(()=>goQ(i+1),350);
}

function pickM(i,v,btn){
  if(!ans['q'+i])ans['q'+i]=[];
  const idx=ans['q'+i].indexOf(v);
  if(idx>=0)ans['q'+i].splice(idx,1); else ans['q'+i].push(v);
  btn.classList.toggle('on');
}

function pickR(rid,v,btn){
  r24[rid]=v;
  btn.parentElement.querySelectorAll('.rbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}

function tryNext(i){
  const q=QS[i];
  if(q.type==='single'&&!ans['q'+i])return;
  goQ(i+1);
}

function showFilterEnd(){
  app.innerHTML=`
  <div class="fend show">
    <div class="flogo">👋</div>
    <div class="fmsg">感谢参与！本测试面向在城市定居3个月以上的18-35岁群体。</div>
    <button class="nbtn next" style="margin-top:20px" onclick="resetAll()">重新开始</button>
  </div>`;
}

// ===== CALC =====
function calcResult(){
  scores={E:0,I:0,S:0,N:0,O:0,H:0,C:0,D:0};
  const add=o=>{if(!o)return;for(const k in o)if(scores[k]!==undefined)scores[k]+=o[k]};
  for(let i=0;i<QS.length;i++){
    const q=QS[i],key='q'+i;
    if(q.type==='single'){
      if(ans[key]&&SC[key]&&SC[key][ans[key]])add(SC[key][ans[key]]);
    } else if(q.type==='multi'){
      if(ans[key]&&SC[key])ans[key].forEach(v=>{if(SC[key][v])add(SC[key][v])});
    } else if(q.type==='rating'){
      if(SC.q24)for(const rid in r24){const b=SC.q24[rid];if(b){const f=r24[rid]/3;for(const k in b)if(scores[k]!==undefined)scores[k]+=Math.round(b[k]*f*10)/10}}
    }
  }
  const d1=scores.E>=scores.I?'E':'I',d2=scores.S>=scores.N?'S':'N',d3=scores.O>=scores.H?'O':'H',d4=scores.C>=scores.D?'C':'D';
  const code=d1+d2+d3+d4;
  showResult(code);
}

// ===== DATA STORAGE =====
const STORAGE_KEY='nct_responses';
function getResponses(){
  try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||[];}catch(e){return[];}
}
function saveResponse(code){
  const responses=getResponses();
  const record={
    id:Date.now(),
    time:new Date().toLocaleString('zh-CN'),
    code:code,
    scores:{...scores},
  };
  // Save each question answer
  for(let i=0;i<QS.length;i++){
    const key='q'+i;
    if(ans[key]!==undefined) record[key]=Array.isArray(ans[key])?ans[key].join(','):(ans[key]||'');
    else record[key]='';
  }
  // Save rating details
  record.ratings={...r24};
  // Save open answer
  const openEl=document.getElementById('openInput');
  if(openEl) record.q25_open=openEl.value;
  responses.push(record);
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(responses));}catch(e){}
}

// ===== CSV EXPORT =====
function exportCSV(){
  const data=getResponses();
  if(!data.length){alert('暂无数据');return;}
  // Build header
  const headers=['序号','时间','人格类型','E','I','S','N','O','H','C','D'];
  for(let i=0;i<QS.length;i++) headers.push('Q'+(i+1));
  headers.push('评分1','评分2','评分3','评分4','评分5','评分6');
  // Build rows
  const rows=data.map((r,idx)=>{
    const row=[idx+1,r.time,r.code,
      r.scores.E,r.scores.I,r.scores.S,r.scores.N,r.scores.O,r.scores.H,r.scores.C,r.scores.D];
    for(let i=0;i<QS.length;i++) row.push(r['q'+i]||'');
    const rt=r.ratings||{};
    row.push(rt[1]||'',rt[2]||'',rt[3]||'',rt[4]||'',rt[5]||'',rt[6]||'');
    return row;
  });
  // Generate CSV with BOM for Excel
  let csv='\uFEFF';
  csv+=headers.map(h=>'"'+h+'"').join(',')+'\n';
  rows.forEach(row=>{csv+=row.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')+'\n';});
  // Download
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='NCT测试数据_'+new Date().toLocaleDateString('zh-CN').replace(/\//g,'-')+'.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// ===== ADMIN DASHBOARD =====
function showAdmin(){
  const data=getResponses();
  const total=data.length;
  // Type distribution
  const typeCounts={};
  Object.keys(TYPES).forEach(k=>typeCounts[k]=0);
  data.forEach(r=>{if(typeCounts[r.code]!==undefined)typeCounts[r.code]++;});
  // Dimension averages
  const avg={E:0,I:0,S:0,N:0,O:0,H:0,C:0,D:0};
  if(total){data.forEach(r=>{for(const k in avg)avg[k]+=r.scores[k]||0;});for(const k in avg)avg[k]=(avg[k]/total).toFixed(1);}
  // Type distribution bar chart
  const maxCount=Math.max(1,...Object.values(typeCounts));
  const typeBarW=16,gap=6,chartW=Object.keys(typeCounts).length*(typeBarW+gap);
  const chartH=120;
  const typeBars=Object.entries(typeCounts).map(([k,v],i)=>{
    const x=i*(typeBarW+gap)+8;
    const bh=Math.max(1,v/maxCount*(chartH-20));
    const y=chartH-bh-2;
    const fill=v>0?'#6c5ce7':'rgba(0,0,0,.06)';
    return `<rect x="${x}" y="${y}" width="${typeBarW}" height="${bh}" rx="2" fill="${fill}" opacity="${v?0.7:0.3}"/><text x="${x+typeBarW/2}" y="${y-3}" text-anchor="middle" font-size="7" fill="${v?'#2d3436':'#b2bec3'}">${v||''}</text><text x="${x+typeBarW/2}" y="${chartH+10}" text-anchor="middle" font-size="6" fill="#636e72">${k}</text>`;
  }).join('');
  // Dimension comparison
  const dimPairs=[{l:'E',r:'I',lc:'#6c5ce7',rc:'#a29bfe'},{l:'S',r:'N',lc:'#00b894',rc:'#55efc4'},{l:'O',r:'H',lc:'#e84393',rc:'#fd79a8'},{l:'C',r:'D',lc:'#e17055',rc:'#fab1a0'}];
  const dimChartW=280,dimChartH=100;
  const dimBars=dimPairs.map((p,i)=>{
    const y=i*22+8;
    const lw=Math.max(2,(parseFloat(avg[p.l])/(parseFloat(avg[p.l])+parseFloat(avg[p.r])+0.01))*(dimChartW-80));
    const rw=Math.max(2,(parseFloat(avg[p.r])/(parseFloat(avg[p.l])+parseFloat(avg[p.r])+0.01))*(dimChartW-80));
    return `<text x="0" y="${y+10}" font-size="9" fill="#2d3436" font-weight="700">${p.l}</text><rect x="20" y="${y}" width="${lw}" height="12" rx="3" fill="${p.lc}" opacity=".7"/><text x="${22+lw}" y="${y+10}" font-size="7" fill="#636e72">${avg[p.l]}</text><text x="${dimChartW/2+10}" y="${y+10}" font-size="9" fill="#2d3436" font-weight="700">${p.r}</text><rect x="${dimChartW/2+30}" y="${y}" width="${rw}" height="12" rx="3" fill="${p.rc}" opacity=".7"/><text x="${dimChartW/2+32+rw}" y="${y+10}" font-size="7" fill="#636e72">${avg[p.r]}</text>`;
  }).join('');

  // ===== Per-question option distribution =====
  const barColors=['#6c5ce7','#00b894','#e84393','#e17055','#a29bfe','#55efc4','#fd79a8','#fab1a0'];
  let qStatsHTML='';
  QS.forEach((q,qi)=>{
    const key='q'+qi;
    // Count respondents for this question
    const respondents=data.filter(r=>r[key]!==undefined&&r[key]!=='');
    const rTotal=respondents.length;
    let body='';
    const typeLabel=q.type==='single'?'单选':q.type==='multi'?'多选':q.type==='rating'?'量表':q.type==='open'?'开放':'--';
    body+=`<div class="qs-head"><span class="qs-num">Q${qi+1}</span><span class="qs-type">${typeLabel}</span></div>`;
    body+=`<div class="qs-text">${q.q}</div>`;
    if(q.type==='single'&&q.opts){
      q.opts.forEach((o,oi)=>{
        const cnt=respondents.filter(r=>r[key]===o.l).length;
        const pct=rTotal?Math.round(cnt/rTotal*100):0;
        const col=barColors[oi%barColors.length];
        body+=`<div class="qs-opt">${o.l}. ${o.t}</div>`;
        body+=`<div class="qs-row"><span class="qs-lbl">${o.l}</span><div class="qs-bar-wrap"><div class="qs-bar" style="width:${pct}%;background:${col};opacity:.7"></div><span class="qs-bar-text">${cnt}人 (${pct}%)</span></div></div>`;
      });
    } else if(q.type==='multi'&&q.opts){
      q.opts.forEach((o,oi)=>{
        const cnt=respondents.filter(r=>{const a=r[key];return a&&a.split(',').includes(o.l)}).length;
        const pct=rTotal?Math.round(cnt/rTotal*100):0;
        const col=barColors[oi%barColors.length];
        body+=`<div class="qs-opt">${o.l}. ${o.t}</div>`;
        body+=`<div class="qs-row"><span class="qs-lbl">${o.l}</span><div class="qs-bar-wrap"><div class="qs-bar" style="width:${pct}%;background:${col};opacity:.7"></div><span class="qs-bar-text">${cnt}人 (${pct}%)</span></div></div>`;
      });
    } else if(q.type==='rating'&&q.ratings){
      q.ratings.forEach((r,ri)=>{
        const rid=ri+1;
        const vals=respondents.filter(r=>r.ratings&&r.ratings[rid]).map(r=>r.ratings[rid]);
        const avg2=vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1):'--';
        body+=`<div class="qs-opt">${rid}. ${r}</div>`;
        body+=`<div class="qs-row"><span class="qs-lbl">${rid}</span><div class="qs-bar-wrap"><div class="qs-bar" style="width:${avg2!=='--'?avg2/5*100:0}%;background:${barColors[ri%barColors.length]};opacity:.7"></div><span class="qs-bar-text">均分 ${avg2} (${vals.length}人)</span></div></div>`;
      });
    } else if(q.type==='open'){
      const cnt=respondents.filter(r=>r[key]).length;
      body+=`<div class="qs-avg">收到 ${cnt} 条回答（详见CSV导出）</div>`;
    }
    qStatsHTML+=`<div class="q-stat">${body}</div>`;
  });

  // Data table
  const tableRows=data.slice(-50).reverse().map((r,idx)=>{
    const i=data.length-idx;
    return `<tr><td>${i}</td><td>${r.time}</td><td><b>${r.code}</b></td><td>${r.scores.E}</td><td>${r.scores.I}</td><td>${r.scores.S}</td><td>${r.scores.N}</td><td>${r.scores.O}</td><td>${r.scores.H}</td><td>${r.scores.C}</td><td>${r.scores.D}</td>${QS.map((_,qi)=>`<td>${r['q'+qi]||''}</td>`).join('')}</tr>`;
  }).join('');

  app.innerHTML=`
  <div class="admin">
    <button class="admin-btn" style="position:static;margin-bottom:16px" onclick="showIntro()">← 返回首页</button>
    <h2>📊 数据管理面板</h2>
    <p class="sub">所有数据保存在浏览器本地，清除浏览器数据会丢失。请定期导出备份。</p>
    <div class="stat-grid">
      <div class="stat-card"><div class="sl">总参与人数</div><div class="sv" style="color:#6c5ce7">${total}</div></div>
      <div class="stat-card"><div class="sl">最多的人格</div><div class="sv" style="color:#00b894">${Object.entries(typeCounts).sort((a,b)=>b[1]-a[1])[0][0]}</div></div>
      <div class="stat-card"><div class="sl">E连结占比</div><div class="sv" style="color:#e84393">${total?Math.round(data.filter(r=>r.code[0]==='E').length/total*100):0}%</div></div>
      <div class="stat-card"><div class="sl">C眷恋占比</div><div class="sv" style="color:#e17055">${total?Math.round(data.filter(r=>r.code[3]==='C').length/total*100):0}%</div></div>
    </div>
    <div class="chart-row">
      <div class="chart-box"><h3>16种人格分布</h3><svg viewBox="0 0 ${chartW+20} ${chartH+18}" xmlns="http://www.w3.org/2000/svg">${typeBars}</svg></div>
      <div class="chart-box"><h3>四维度平均分对比</h3><svg viewBox="0 0 ${dimChartW+10} ${dimChartH}" xmlns="http://www.w3.org/2000/svg">${dimBars}</svg></div>
    </div>
    <div class="exp-row">
      <button class="exp-btn" onclick="exportCSV()">📥 导出 CSV（Excel/SPSS）</button>
      <button class="exp-btn" onclick="exportJSON()">📥 导出 JSON</button>
      <button class="exp-btn" onclick="if(confirm('确定清空所有数据？此操作不可恢复！')){localStorage.removeItem('nct_responses');showAdmin();}">🗑️ 清空数据</button>
    </div>
    <div class="section-title">逐题选项分布</div>
    ${qStatsHTML}
    <div class="section-title">原始数据表（最近50条）</div>
    <div class="tbl-wrap">
      <table>
        <tr><th>#</th><th>时间</th><th>类型</th><th>E</th><th>I</th><th>S</th><th>N</th><th>O</th><th>H</th><th>C</th><th>D</th>${QS.map((_,i)=>'<th>Q'+(i+1)+'</th>').join('')}</tr>
        ${tableRows}
      </table>
    </div>
  </div>`;
}

showIntro();

</script>
</body>
</html>
